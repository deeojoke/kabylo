<!DOCTYPE html>
<html>
<head>
<title>Kabylo Watch</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="style/watch.css" rel="stylesheet"/>

<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Audiowide">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
.video-container{
width:90%;
max-width:1000px;
margin:auto;
}

video{
width:100%;
}
</style>

</head>


<body>


<div class="section">

<div class="nav">
<a href="index.html"><img src="kabylo1.png" alt=""></a>
</div>

<div class="poster-container">
<img id="moviePoster" src="">
</div>

<h1 id="movieTitle"></h1>

</div>



<div class="video-container">

<video id="player" playsinline controls>

<source id="videoSource" src="" type="video/mp4">

</video>

</div>



<h2>Suggested Movies</h2>



<div class="images">

<div class="background">
<a href="watch.html?video=https://drive.google.com/uc?export=download&id=1UXz7v8W50HTCwA_keEFWzN5KPy_qKSOx&title=Pucci 2&poster=images/pucci2.jpg">

<div class="image-wrapper">
<img class="background1" src="images/pucci2.jpg">
<i class="fa fa-play play-icon"></i>
</div>

<p>pucci 2</p>

</a>
</div>


<div class="background">
<a href="watch.html?video=https://drive.google.com/uc?export=download&id=1EBQOgVEyr96mfAv1ln-UFnlrzbfpxDsE&title=Pucci 3&poster=images/pucci3.jpg">

<div class="image-wrapper">
<img class="background1" src="images/pucci3.jpg">
<i class="fa fa-play play-icon"></i>
</div>

<p>pucci 3</p>

</a>
</div>


</div>



<div class="button">
<a href="index.html" class="glitch-btn">SHOW ALL</a>
</div>



<div class="footer">

<p>Share with your friends to suppot us </p>

<a href="index.html"><img src="kabylo2.png"></a>

<div class="counter">
<img src="https://visitor-badge.laobi.icu/badge?page_id=kabylo.site">
</div>

</div>



<script>

const params = new URLSearchParams(window.location.search)

const video = params.get("video")
const title = params.get("title")
const poster = params.get("poster")

if(video){
document.getElementById("videoSource").src = video
}

if(title){
document.getElementById("movieTitle").textContent = title
}

if(poster){
document.getElementById("moviePoster").src = poster

document.querySelector(".section").style.backgroundImage =
`linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0.3)), url(${poster})`
}

</script>



<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>

const player = new Plyr('#player')

</script>


</body>
</html>
