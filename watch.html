<!--change urls script-->
<script>
const params = new URLSearchParams(window.location.search);
const video = params.get("video");
const title = params.get("title");
const poster = params.get("poster");


const frame = document.getElementById("movieFrame");

if(video){
    frame.src = video;
}else{
    document.body.innerHTML += "<p>No video URL received</p>";
}

if(title){
    document.getElementById("movieTitle").textContent = title;
}
if(poster){
    document.getElementById("moviePoster").src = poster;
}
if(poster){
document.querySelector(".section").style.backgroundImage =
`linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0.3)), url(${poster})`;
}

</script>
